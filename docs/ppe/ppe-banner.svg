<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="35%" stop-color="#31fff3"></stop>
      <stop offset="70%" stop-color="#0aa6ff"></stop>
      <stop offset="100%" stop-color="#07172f"></stop>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#1cf7d2"></stop>
      <stop offset="0.5" stop-color="#00aaff"></stop>
      <stop offset="1" stop-color="#ffb454"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="34" fill="#061022"></rect>
  <rect x="1" y="1" width="1398" height="418" rx="34" stroke="#17345e"></rect>

  <g opacity="0.22">
    <path d="M0 90H1400M0 180H1400M0 270H1400M0 360H1400" stroke="#2a69a6"></path>
    <path d="M160 0V420M360 0V420M560 0V420M760 0V420M960 0V420M1160 0V420" stroke="#2a69a6"></path>
  </g>

  <text x="90" y="95" fill="#75cfff" font-size="24" font-family="Arial" letter-spacing="8">MANDALE-OS RESEARCH PROGRAM</text>
  <text x="90" y="180" fill="#f5f8ff" font-size="76" font-family="Arial Black, Arial" font-weight="900">M-OS PPE</text>
  <text x="90" y="225" fill="#b9c9df" font-size="28" font-family="Arial">Pattern Proof Engine for verifiable execution intelligence</text>

  <g font-family="Arial" font-size="22" font-weight="700">
    <rect x="90" y="270" width="150" height="46" rx="20" stroke="#25f4d0" fill="#061b32"></rect>
    <text x="124" y="300" fill="#eaffff">RUN</text>
    <rect x="260" y="270" width="180" height="46" rx="20" stroke="#25f4d0" fill="#061b32"></rect>
    <text x="294" y="300" fill="#eaffff">DETECT</text>
    <rect x="460" y="270" width="150" height="46" rx="20" stroke="#25f4d0" fill="#061b32"></rect>
    <text x="493" y="300" fill="#eaffff">REUSE</text>
    <rect x="630" y="270" width="150" height="46" rx="20" stroke="#25f4d0" fill="#061b32"></rect>
    <text x="664" y="300" fill="#eaffff">PROVE</text>
    <rect x="800" y="270" width="170" height="46" rx="20" stroke="#ffb454" fill="#061b32"></rect>
    <text x="828" y="300" fill="#fff2d0">VERIFY</text>
  </g>

  <path d="M1030 210C1120 120 1230 120 1320 210C1230 300 1120 300 1030 210Z" stroke="url(#line)" stroke-width="3" opacity="0.7">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="3s" repeatCount="indefinite"></animate>
  </path>

  <circle cx="1175" cy="210" r="90" fill="url(#orb)" filter="url(#glow)">
    <animate attributeName="r" values="78;96;78" dur="3.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="1175" cy="210" r="130" stroke="#1cf7d2" stroke-width="3" opacity="0.45">
    <animateTransform attributeName="transform" type="rotate" from="0 1175 210" to="360 1175 210" dur="9s" repeatCount="indefinite"></animateTransform>
  </circle>
  <circle cx="1175" cy="210" r="165" stroke="#1468ff" stroke-width="2" opacity="0.25" stroke-dasharray="12 16">
    <animateTransform attributeName="transform" type="rotate" from="360 1175 210" to="0 1175 210" dur="14s" repeatCount="indefinite"></animateTransform>
  </circle>

  <path d="M90 360H970" stroke="url(#line)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="30 900;900 30;30 900" dur="4s" repeatCount="indefinite"></animate>
  </path>
</svg>