<svg width="1500" height="760" viewBox="0 0 1500 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="box" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f274a"></stop>
      <stop offset="100%" stop-color="#082f2e"></stop>
    </linearGradient>
    <linearGradient id="proof" x1="0" x2="1">
      <stop offset="0%" stop-color="#0e7490"></stop>
      <stop offset="100%" stop-color="#92400e"></stop>
    </linearGradient>
  </defs>

  <rect width="1500" height="760" rx="24" fill="#050b18"></rect>

  <text x="70" y="70" fill="#f8fafc" font-size="46" font-family="Inter, Arial" font-weight="800">
    M-OS MEE → PPE Architecture
  </text>
  <text x="70" y="112" fill="#94a3b8" font-size="22" font-family="Inter, Arial">
    Execution Memory Reactor extended with proof, evidence, and verification authority.
  </text>

  <g font-family="Inter, Arial" font-weight="700" font-size="24">
    <rect x="80" y="190" width="210" height="95" rx="20" fill="url(#box)" stroke="#38bdf8"></rect>
    <text x="130" y="248" fill="#f8fafc">INPUT</text>

    <rect x="340" y="190" width="230" height="95" rx="20" fill="url(#box)" stroke="#38bdf8"></rect>
    <text x="380" y="248" fill="#f8fafc">SIGNATURE</text>

    <rect x="620" y="190" width="240" height="95" rx="20" fill="url(#box)" stroke="#38bdf8"></rect>
    <text x="660" y="248" fill="#f8fafc">PATTERN</text>

    <rect x="910" y="190" width="240" height="95" rx="20" fill="url(#box)" stroke="#38bdf8"></rect>
    <text x="955" y="248" fill="#f8fafc">DECISION</text>

    <rect x="1200" y="190" width="230" height="95" rx="20" fill="url(#box)" stroke="#38bdf8"></rect>
    <text x="1260" y="248" fill="#f8fafc">REUSE</text>
  </g>

  <g stroke="#2dd4bf" stroke-width="4" stroke-linecap="round">
    <line x1="290" y1="237" x2="340" y2="237"></line>
    <line x1="570" y1="237" x2="620" y2="237"></line>
    <line x1="860" y1="237" x2="910" y2="237"></line>
    <line x1="1150" y1="237" x2="1200" y2="237"></line>
  </g>

  <text x="80" y="360" fill="#93c5fd" font-size="24" font-family="Inter, Arial" letter-spacing="4">
    PPE PROOF LAYER
  </text>

  <g font-family="Inter, Arial" font-weight="700" font-size="23">
    <rect x="160" y="420" width="260" height="105" rx="22" fill="url(#proof)" stroke="#f59e0b"></rect>
    <text x="205" y="482" fill="#fff">PROOF ENGINE</text>

    <rect x="500" y="420" width="280" height="105" rx="22" fill="url(#proof)" stroke="#f59e0b"></rect>
    <text x="545" y="482" fill="#fff">EVIDENCE EXPORT</text>

    <rect x="860" y="420" width="280" height="105" rx="22" fill="url(#proof)" stroke="#f59e0b"></rect>
    <text x="910" y="482" fill="#fff">VERIFICATION</text>

    <rect x="1220" y="420" width="220" height="105" rx="22" fill="url(#proof)" stroke="#f59e0b"></rect>
    <text x="1275" y="482" fill="#fff">REPORT</text>
  </g>

  <g stroke="#f59e0b" stroke-width="4" stroke-linecap="round">
    <line x1="420" y1="472" x2="500" y2="472"></line>
    <line x1="780" y1="472" x2="860" y2="472"></line>
    <line x1="1140" y1="472" x2="1220" y2="472"></line>
  </g>

  <text x="80" y="650" fill="#cbd5e1" font-size="24" font-family="Inter, Arial">
    Core idea: execution is not complete until it can be proven, exported, and independently verified.
  </text>
</svg>