<svg width="1400" height="520" viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- gradients -->
<radialGradient id="coreGlow">
  <stop offset="0%" stop-color="#ffffff"></stop>
  <stop offset="35%" stop-color="#26ffd8"></stop>
  <stop offset="100%" stop-color="#07172f"></stop>
</radialGradient>

<linearGradient id="flow" x1="0" y1="0" x2="1400" y2="0">
  <stop offset="0%" stop-color="#26ffd8"></stop>
  <stop offset="0.5" stop-color="#35a7ff"></stop>
  <stop offset="1" stop-color="#ffb454"></stop>
</linearGradient>

</defs>

<!-- background -->
<rect width="1400" height="520" rx="30" fill="#061022"></rect>

<!-- grid -->
<g opacity="0.08">
  <path d="M0 100H1400M0 200H1400M0 300H1400M0 400H1400" stroke="#5aa2ff"></path>
  <path d="M200 0V520M400 0V520M600 0V520M800 0V520M1000 0V520M1200 0V520" stroke="#5aa2ff"></path>
</g>

<!-- title -->
<text x="80" y="80" fill="#75cfff" font-size="20" font-family="Arial">
PPE — LIVE EXECUTION FLOW
</text>

<text x="80" y="130" fill="#ffffff" font-size="46" font-family="Arial Black">
RUN → DETECT → ROUTE → REUSE → PROVE → VERIFY
</text>

<!-- FLOW LINE -->
<path d="M150 260 H1250" stroke="url(#flow)" stroke-width="5" stroke-linecap="round" stroke-dasharray="20 1000">
  <animate attributeName="stroke-dashoffset" from="0" to="-2000" dur="5s" repeatCount="indefinite"></animate>
</path>

<!-- NODES -->
<g font-family="Arial" font-size="20" text-anchor="middle">

<!-- RUN -->
<g>
  <circle cx="180" cy="260" r="60" fill="url(#coreGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="6s" begin="0s" repeatCount="indefinite"></animate>
  </circle>
  <text x="180" y="268" fill="#ffffff">RUN</text>
</g>

<!-- DETECT -->
<g>
  <circle cx="380" cy="260" r="60" fill="url(#coreGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="6s" begin="0.5s" repeatCount="indefinite"></animate>
  </circle>
  <text x="380" y="268" fill="#ffffff">DETECT</text>
</g>

<!-- ROUTE -->
<g>
  <circle cx="580" cy="260" r="60" fill="url(#coreGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="6s" begin="1s" repeatCount="indefinite"></animate>
  </circle>
  <text x="580" y="268" fill="#ffffff">ROUTE</text>
</g>

<!-- REUSE -->
<g>
  <circle cx="780" cy="260" r="60" fill="url(#coreGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="6s" begin="1.5s" repeatCount="indefinite"></animate>
  </circle>
  <text x="780" y="268" fill="#ffffff">REUSE</text>
</g>

<!-- PROVE -->
<g>
  <circle cx="980" cy="260" r="65" fill="url(#coreGlow)">
    <animate attributeName="r" values="60;70;60" dur="3s" begin="2s" repeatCount="indefinite"></animate>
  </circle>
  <text x="980" y="268" fill="#ffffff">PROVE</text>
</g>

<!-- VERIFY -->
<g>

  <!-- core -->
  <circle cx="1180" cy="260" r="70" fill="url(#coreGlow)">
    <animate attributeName="r" values="65;80;65" dur="3s" begin="2.5s" repeatCount="indefinite"></animate>
  </circle>

  <!-- rotating ring -->
  <circle cx="1180" cy="260" r="105" stroke="#ffb454" stroke-width="3" fill="none" stroke-dasharray="10 12">
    <animateTransform attributeName="transform" type="rotate" from="0 1180 260" to="360 1180 260" dur="8s" repeatCount="indefinite"></animateTransform>
  </circle>

  <!-- pulse ring -->
  <circle cx="1180" cy="260" r="140" stroke="#ffb454" stroke-width="2" opacity="0.2" fill="none">
    <animate attributeName="r" values="120;160;120" dur="3s" repeatCount="indefinite"></animate>
  </circle>

  <text x="1180" y="268" fill="#ffffff">VERIFY</text>

</g>

</g>

<!-- captions -->
<g font-family="Arial" font-size="16" fill="#9bb4d1" text-anchor="middle">
  <text x="180" y="380">Input</text>
  <text x="380" y="380">Pattern</text>
  <text x="580" y="380">Routing</text>
  <text x="780" y="380">Reuse</text>
  <text x="980" y="380">Proof</text>
  <text x="1180" y="380">Validation</text>
</g>

<!-- footer -->
<text x="80" y="470" fill="#7c97b5" font-size="20" font-family="Arial">
Execution Memory Reactor + Pattern Proof Engine — verifiable compute layer
</text>

</svg>